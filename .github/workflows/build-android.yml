name: Build Android App

on:
  push:
    branches: [main, feat/acp-rn-sync]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125"

      - name: Install dependencies
        run: bun install

      - name: Generate Android project
        run: |
          cd /tmp
          npx @react-native-community/cli@15.1.3 init HermitMobile \
            --version 0.76.0 \
            --skip-install \
            --directory HermitMobile
          cp -r /tmp/HermitMobile/android "$GITHUB_WORKSPACE/apps/mobile/android"

      - name: Build Android release APK
        working-directory: apps/mobile/android
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermit-android-release
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

name: Publish Packages to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号 (例如 0.1.0)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup Node.js for npm publishing
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@hermit-org"

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Update package versions and resolve workspace deps
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Updating packages to version $VERSION"

          PACKAGES=(
            "packages/types"
            "packages/utils"
            "packages/stdio-to-sse"
            "packages/cli"
          )

          for pkg in "${PACKAGES[@]}"; do
            echo "Setting $pkg version to $VERSION"
            node -e "
              const fs = require('fs');
              const p = '$pkg/package.json';
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              pkg.version = '$VERSION';
              // 将 workspace:* 解析为实际版本号，npm publish 需要
              for (const depType of ['dependencies', 'devDependencies', 'peerDependencies']) {
                if (pkg[depType]) {
                  for (const [name, version] of Object.entries(pkg[depType])) {
                    if (typeof version === 'string' && version.startsWith('workspace:')) {
                      pkg[depType][name] = '^$VERSION';
                    }
                  }
                }
              }
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            "
          done

      - name: Publish @hermit-org/types
        run: npm publish --access public
        working-directory: packages/types
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @hermit-org/utils
        run: npm publish --access public
        working-directory: packages/utils
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @hermit-org/stdio-to-sse
        run: npm publish --access public
        working-directory: packages/stdio-to-sse
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @hermit-org/cli
        run: npm publish --access public
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

# Hermit 一键启动（拉取远程镜像，内置 kimi agent）
#
# 用法：
#   1. 填 API key：把 KIMI_API_KEY 写进 .env（cp .env.example .env）
#   2. 首次拉取如遇 403/404，先登录 GHCR（见下方说明）
#   3. docker compose up -d
#   4. 浏览器打开 http://localhost:5180
#
# GHCR 登录（镜像为 private 时需要）：
#   echo <你的GitHub PAT, read:packages 权限> | docker login ghcr.io -u <GitHub用户名> --password-stdin

services:
  hermit:
    image: ghcr.io/hermit-org/hermit:0.0.3-alpha.5
    container_name: hermit
    ports:
      - "8787:8787"   # 网关 SSE
      - "5180:80"     # Web 客户端
    environment:
      KIMI_API_KEY: ${KIMI_API_KEY:?请在 .env 中设置 KIMI_API_KEY}
    volumes:
      - hermit-data:/root/.hermit        # 持久化配对令牌
      - kimi-config:/root/.kimi-code     # 持久化 kimi 配置
      - ./hermit.config.json:/app/hermit.config.json:ro
    restart: unless-stopped

volumes:
  hermit-data:
  kimi-config:

# Hermit 一键启动（内置 kimi agent）
#
# 用法：
#   1. 把你的 Kimi API key 填进 .env（或在下方 environment 直接改）
#   2. docker compose up -d --build
#   3. 浏览器打开 http://localhost:5180
#
# API key 获取：https://platform.kimi.com  或  https://platform.kimi.ai

services:
  hermit:
    build: .
    image: hermit
    container_name: hermit
    ports:
      - "8787:8787"   # 网关 SSE
      - "5180:80"     # Web 客户端
    environment:
      # kimi CLI 通过该环境变量读取 API key（适合 CI/CD、容器场景）
      KIMI_API_KEY: ${KIMI_API_KEY:?请在 .env 中设置 KIMI_API_KEY}
    volumes:
      # 持久化 hermit 配对令牌
      - hermit-data:/root/.hermit
      # 持久化 kimi 登录/配置（OAuth token 等）
      - kimi-config:/root/.kimi-code
      # agent 配置（已是 kimi acp），可在宿主机修改即时生效
      - ./hermit.config.json:/app/hermit.config.json:ro
    restart: unless-stopped

volumes:
  hermit-data:
  kimi-config:
